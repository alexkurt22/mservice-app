name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Generate system files
        run: flutter create --platforms=android .
        
      - name: Fix Android Manifest for SMS
        run: |
          echo "import 'dart:io'; void main() { var f = File('android/app/src/main/AndroidManifest.xml'); var text = f.readAsStringSync(); text = text.replaceFirst('<application', '<queries><intent><action android:name=\"android.intent.action.VIEW\"/><data android:scheme=\"sms\"/></intent></queries><application'); f.writeAsStringSync(text); }" > fix_manifest.dart
          dart fix_manifest.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Fix Android SDK versions
        run: |
          find /home/runner/.pub-cache/hosted -name "build.gradle" -type f -exec sed -i 's/compileSdkVersion 33/compileSdkVersion 34/g' {} +
          find /home/runner/.pub-cache/hosted -name "build.gradle" -type f -exec sed -i 's/compileSdk 33/compileSdk 34/g' {} +
          sed -i 's/compileSdk = 33/compileSdk = 34/g' android/app/build.gradle.kts 2>/dev/null || true
          sed -i 's/targetSdk = 33/targetSdk = 34/g' android/app/build.gradle.kts 2>/dev/null || true
          sed -i 's/compileSdkVersion 33/compileSdkVersion 34/g' android/app/build.gradle 2>/dev/null || true
          sed -i 's/targetSdkVersion 33/targetSdkVersion 34/g' android/app/build.gradle 2>/dev/null || true

      # --- ЧИТАЕМ СЕКРЕТЫ И НАСТРАИВАЕМ ПОДПИСЬ (УНИВЕРСАЛЬНЫЙ МЕТОД) ---
      - name: Inject Secret Keys and Permanent Keystore
        env:
          FIREBASE_SECRET: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          KEYSTORE_SECRET: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p assets
          echo "$FIREBASE_SECRET" | base64 -d > assets/firebase_credentials.json
          
          # Расшифровываем наш постоянный ключ!
          echo "$KEYSTORE_SECRET" | base64 -d > android/app/upload-keystore.jks
          
          # Умный скрипт настройки подписи для любого типа gradle-файлов
          cat << 'EOF' > setup_signing.dart
          import 'dart:io';
          void main() {
            var kts = File('android/app/build.gradle.kts');
            var gradle = File('android/app/build.gradle');
            if (kts.existsSync()) {
              var text = kts.readAsStringSync();
              text = text.replaceFirst(
                'buildTypes {',
                'signingConfigs {\n        create("release") {\n            storeFile = file("upload-keystore.jks")\n            storePassword = "mservice123"\n            keyAlias = "upload"\n            keyPassword = "mservice123"\n        }\n    }\n    buildTypes {'
              );
              text = text.replaceAll('signingConfigs.getByName("debug")', 'signingConfigs.getByName("release")');
              text = text.replaceAll('signingConfig = signingConfigs.debug', 'signingConfig = signingConfigs.getByName("release")');
              kts.writeAsStringSync(text);
              print('Configured Kotlin DSL (build.gradle.kts)');
            } else if (gradle.existsSync()) {
              var text = gradle.readAsStringSync();
              text = text.replaceFirst(
                'buildTypes {',
                'signingConfigs {\n        release {\n            storeFile file("upload-keystore.jks")\n            storePassword "mservice123"\n            keyAlias "upload"\n            keyPassword "mservice123"\n        }\n    }\n    buildTypes {'
              );
              text = text.replaceAll('signingConfig signingConfigs.debug', 'signingConfig signingConfigs.release');
              gradle.writeAsStringSync(text);
              print('Configured Groovy (build.gradle)');
            }
          }
          EOF
          dart setup_signing.dart

      # --- СБОРКА С АВТО-ПОВЫШЕНИЕМ ВЕРСИИ ---
      - name: Build APK
        run: flutter build apk --release --build-name=1.0.${{ github.run_number }} --build-number=${{ github.run_number }}

      - name: Rename APK with Date and Time
        run: |
          export TZ="Asia/Ashgabat"
          BUILD_TIME=$(date +'%d-%m-%Y_%H-%M')
          NEW_NAME="MService_App_v1.0.${{ github.run_number }}_${BUILD_TIME}.apk"
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/$NEW_NAME
          echo "FINAL_APK_NAME=$NEW_NAME" >> $GITHUB_ENV
          echo "FINAL_ZIP_NAME=MService_App_v1.0.${{ github.run_number }}_${BUILD_TIME}" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FINAL_ZIP_NAME }}
          path: build/app/outputs/flutter-apk/${{ env.FINAL_APK_NAME }}
